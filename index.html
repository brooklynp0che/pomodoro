<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>girly pomodoro timer</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <div id = "timer-message">set your timer before starting please</div>
    <div class = "main-container">
        <div class = "timer">
            <h1>pomorodo timer</h1>
            <div class = "button-container">
                <button class = "button" id = "session-button">pomodoro</button>
            </div>

            <main>
                <div class="pomodoro">
                    <div id="pomodoro-timer" class = "timer-display" data-duration="25.00">
                        <h1 class = "time">30:00</h1>
                    </div>
                </div>
            </main>

            <div class="buttons">
                <button id="start">START</button>
                <button id="stop">STOP</button>
            </div>
        </div>
    </div>
    <!--js script here-->
    <script src = "main.js"></script>
</body>
</html>

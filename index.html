<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>smitski pomodoro timer</title>
    <link rel = "stylesheet" href = "style.css">
    
</head>
<body>
    <section>
        <div class="container">
            <h1>smitski pomodoro timer</h1>
            <div class="pannel">
                <p id = "work" class = "active">work</p>
                <p id = "break">break</p>
            </div>
            <div class="timer">
                <div class="circle">
                    <div class="time">
                        <p id = minutes>40</p>
                        <p>:</p>
                        <p id = seconds>00</p>
                    </div>
                </div>
            </div>
            <div class="controls">
                <button id = "start" onclick = "start()"><i class = "fa-solid fa-play"></i></button>
                <a href = "/"><i class = "fa-solid fa-arrow-rotate-left"></i></a>
            </div>
        </div>

    </section>

    <script src = "main.js"></script>
</body>
</html>
